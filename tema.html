<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tema — Foro Suljaa'</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main main--foro">

        <!-- NAVBAR -->

        <div class="navbar">
            <button class="menu-toggle">☰</button>

            <div class="icon">
                <h2 class="logo">Suljaa'</h2>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="historia.html">Historia</a></li>
                    <li><a href="turismo.html">Turismo</a></li>
                    <li><a href="negocios.html">Negocios</a></li>
                    <li><a href="mapa.html">Mapa</a></li>
                    <li><a href="foro.html" class="active-link">Foro</a></li>
                </ul>
            </div>

            <div class="search">
                <input
                    class="srch"
                    type="search"
                    placeholder="Buscar">

                <a href="#">
                    <button class="btn">Buscar</button>
                </a>
            </div>

        </div>

        <!-- HERO -->

        <div class="page-hero">
            <p class="page-eyebrow"><a href="foro.html" class="back-link">← Volver al foro</a></p>
            <h1 id="tema-titulo">Cargando tema...</h1>
        </div>

    </div>

    <!-- DETALLE DEL TEMA -->

    <main class="forum">

        <div class="topic-detail" id="topic-detail">
            <!-- Encabezado del tema: generado dinámicamente desde tema-firebase.js -->
        </div>

        <!-- FORMULARIO DE COMENTARIO -->

        <div class="comment-form-wrapper" id="comment-form-wrapper">

            <h3 class="comments-title">Comentarios</h3>

            <div class="forum-auth" id="comment-auth">
                <!-- Login/usuario generado dinámicamente -->
            </div>

            <form id="comment-form" class="topic-form">

                <textarea
                    id="comment-text"
                    class="topic-textarea"
                    placeholder="Escribe un comentario..."
                    maxlength="500"></textarea>

                <button type="submit" class="btn topic-submit">Comentar</button>

            </form>

        </div>

        <!-- LISTA DE COMENTARIOS -->

        <div class="comments-list" id="comments-list">
            <!-- Comentarios generados dinámicamente -->
        </div>

        <p class="no-results show" id="comments-empty">Todavía no hay comentarios. ¡Sé el primero!</p>

    </main>

    <!-- JAVASCRIPT -->

    <script src="script.js"></script>

    <!-- FIREBASE: detalle del tema + comentarios -->
    <script type="module" src="tema-firebase.js"></script>

</body>
</html>
